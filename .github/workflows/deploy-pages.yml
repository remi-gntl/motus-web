name: Deploy React to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./mon-portfolio

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./mon-portfolio/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Build React (Vite)
        run: npm run build

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Uploader l’artefact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./mon-portfolio/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
